name: Refresh NBA data

# Re-runs the pipeline (ingest -> DuckDB -> dbt) and republishes the
# warehouse file as the "data-latest" GitHub Release asset. The Streamlit
# app polls a small version marker next to that asset and re-downloads
# automatically, so there's nothing to do on the app side after this runs.
#
# Schedule: Tuesdays 13:00 UTC (after Monday's games settle). Adjust the
# cron below for a different cadence, or just use "Run workflow" any time.
on:
  schedule:
    - cron: "0 13 * * 2"
  workflow_dispatch:
    inputs:
      pbp_games:
        description: "Play-by-play games to pull for the current season"
        default: "20"

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r requirements.txt

      - name: Ingest current season
        run: >
          python ingestion/nba_ingest.py --force
          --pbp-games ${{ github.event.inputs.pbp_games || '20' }}

      - name: Load DuckDB warehouse
        run: python scripts/load_to_duckdb.py

      - name: Build dbt models
        working-directory: dbt/basketball_intelligence
        run: |
          dbt run --profiles-dir .
          dbt test --profiles-dir .

      - name: Stamp version
        run: date -u +%Y-%m-%dT%H:%M:%SZ > warehouse/version.txt

      - name: Publish release asset
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release view data-latest >/dev/null 2>&1 || \
            gh release create data-latest --title "Warehouse (auto-refreshed)" \
              --notes "Kept up to date by .github/workflows/refresh-data.yml"
          gh release upload data-latest \
            warehouse/basketball.duckdb warehouse/version.txt --clobber

      # The warehouse itself stays out of git (see the Release upload above);
      # this is just a few lines of JSON so a refresh's outcome can be read
      # straight off GitHub, or by an assistant running `gh api` against this
      # path, without pulling the full file.
      - name: Write status file
        run: python scripts/write_metadata.py

      - name: Commit status file if it changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/last_updated.json
          git diff --cached --quiet || git commit -m "Update data/last_updated.json"
          git push
